- case: argument_error
  main: |
    from tightwrap import wraps

    def inner(a: int) -> int:
      return a + 1

    @wraps(inner)
    def wrapped(*args, **kwargs) -> int:
      return inner(*args, **kwargs)

    wrapped("a string")  # E: Argument 1 to "__call__" of "MethodWrapper" has incompatible type "str"; expected "int"  [arg-type]

- case: method_argument_error
  main: |
    from tightwrap import wraps

    class MyClass:
        @staticmethod
        def _inner(a: int, b: str) -> str:
            return f"{a}: {b}"

        @wraps(_inner)
        def outer(self, *args, **kwargs) -> str:
            return self._inner(*args, **kwargs)

    obj = MyClass()
    obj.outer("not an int", "hello")  # E: Argument 1 has incompatible type "str"; expected "int"  [arg-type]

- case: method_correct_usage
  main: |
    from tightwrap import wraps

    class MyClass:
        @staticmethod
        def _inner(a: int, b: str) -> str:
            return f"{a}: {b}"

        @wraps(_inner)
        def outer(self, *args, **kwargs) -> str:
            return self._inner(*args, **kwargs)

    obj = MyClass()
    result: str = obj.outer(42, "hello")  # This should type-check correctly

